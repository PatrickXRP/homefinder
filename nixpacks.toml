[phases.setup]
nixPkgs = ["(php.withExtensions (pe: pe.enabled ++ [pe.all.pgsql pe.all.pdo_pgsql]))", "nginx", "phpPackages.composer", "nodejs_22", "npm-9_x"]

[phases.install]
cmds = ["mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx", "composer install --ignore-platform-reqs", "npm i"]

[phases.build]
cmds = ["npm run build", "php artisan filament:assets 2>/dev/null || true", "chmod -R ugo+rw /app/storage || true"]

[start]
cmd = "bash /app/docker/start.sh"

[variables]
IS_LARAVEL = "true"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
